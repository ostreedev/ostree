name: Rust

permissions:
  actions: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_PROJECT_FEATURES: "v2022_6"
  # TODO: Automatically query this from the C side
  LATEST_LIBOSTREE: "v2022_6"

jobs:
  build:
    runs-on: ubuntu-latest
    container: quay.io/coreos-assembler/fcos-buildroot:testing-devel
    steps:
      - uses: actions/checkout@v2
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@ce325b60658c1b38465c06cc965b79baf32c1e72
      - name: cargo fmt (check)
        run: |
          cargo fmt -p ostree -- --check -l
          for d in tests/inst tests/bootc-integration tests/xtask; do
            cargo fmt --manifest-path $d/Cargo.toml -- --check -l
          done
      - name: Build
        run: cargo build --verbose --features=${{ env['CARGO_PROJECT_FEATURES'] }}
      - name: Run tests
        run: cargo test --verbose --features=${{ env['CARGO_PROJECT_FEATURES'] }}
      - name: cargo clippy
        run: |
          CLIPPY_CONFIG="-A clippy::all -D clippy::correctness -D clippy::suspicious -Dunused_imports -Ddead_code"
          cargo clippy -p ostree --features=${{ env['CARGO_PROJECT_FEATURES'] }} -- $CLIPPY_CONFIG
          for d in tests/inst tests/bootc-integration tests/xtask; do
            cargo clippy --manifest-path $d/Cargo.toml -- $CLIPPY_CONFIG
          done
      - name: cargo doc
        run: env RUSTDOCFLAGS='-D warnings' cargo doc --lib -p ostree --features=${{ env['CARGO_PROJECT_FEATURES'] }}
  build-no-features:
    runs-on: ubuntu-latest
    container: quay.io/coreos-assembler/fcos-buildroot:testing-devel
    steps:
      - uses: actions/checkout@v2
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@ce325b60658c1b38465c06cc965b79baf32c1e72
      - name: Build
        run: cargo test --no-run
      - name: Run tests
        run: cargo test --verbose
  build-git-libostree:
    runs-on: ubuntu-latest
    container: quay.io/coreos-assembler/fcos-buildroot:testing-devel
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
          submodules: true
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@ce325b60658c1b38465c06cc965b79baf32c1e72
      - name: Build libostree
        run: ./ci/build.sh
      - name: Install libostree
        run: make -C target/c install
      - name: Rust build
        run: cargo test --no-run --verbose --features=${{ env['LATEST_LIBOSTREE'] }}
      - name: Run tests
        run: cargo test --verbose --features=${{ env['LATEST_LIBOSTREE'] }}
  cargo-deny:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: EmbarkStudios/cargo-deny-action@v2
      with:
        log-level: warn
        command: check bans sources licenses
